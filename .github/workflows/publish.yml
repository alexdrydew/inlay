name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      testpypi:
        description: Publish to TestPyPI
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-sdist:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build source distribution
        run: uv build --sdist --python 3.14 --out-dir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheels:
    needs: build-sdist
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archs: x86_64
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            archs: aarch64
          - name: macos-x86_64
            os: macos-15-intel
            archs: x86_64
          - name: macos-arm64
            os: macos-14
            archs: arm64
          - name: windows-amd64
            os: windows-latest
            archs: AMD64
          - name: windows-arm64
            os: windows-11-arm
            archs: ARM64

    steps:
      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist

      - name: Locate source distribution
        id: sdist
        shell: bash
        run: printf 'path=%s\n' dist/*.tar.gz >> "$GITHUB_OUTPUT"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          extras: uv
          output-dir: wheelhouse
          package-dir: ${{ steps.sdist.outputs.path }}
        env:
          CIBW_BEFORE_ALL_LINUX: curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          CIBW_ARCHS: ${{ matrix.archs }}
          CIBW_BUILD: cp3??-*
          CIBW_BUILD_FRONTEND: uv
          CIBW_ENVIRONMENT_LINUX: PATH="$HOME/.cargo/bin:$PATH" CARGO_TERM_COLOR=always
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux2014
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_SKIP: cp3??t-*

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment: publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Publish package to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.testpypi
        run: uv publish --trusted-publishing always --publish-url https://test.pypi.org/legacy/ --check-url https://test.pypi.org/simple/

      - name: Publish package to PyPI
        if: github.event_name != 'workflow_dispatch' || !inputs.testpypi
        run: uv publish --trusted-publishing always
