name: Checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  UV_LOCKED: "1"

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.18"
          enable-cache: auto
          cache-dependency-glob: uv.lock
          prune-cache: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install Python dependencies
        run: uv sync --dev --locked

      - name: Run prek hooks
        run: uv run prek run --all-files

      - name: Run Rust lints
        run: make lint-rust

      - name: Run tests
        run: make test

  python-typecheck:
    name: typecheck (${{ matrix.checker }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - checker: mypy
            command: make mypy
          - checker: pyright
            command: make pyright
          - checker: basedpyright
            command: make basedpyright verifytypes
          - checker: pyrefly
            command: make pyrefly
          - checker: ty
            command: make ty
          - checker: zuban
            command: make zuban

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.18"
          enable-cache: auto
          cache-dependency-glob: uv.lock
          prune-cache: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install Python dependencies
        run: uv sync --dev --locked

      - name: Run ${{ matrix.checker }}
        run: ${{ matrix.command }}

  artifacts:
    runs-on: ubuntu-latest
    needs: [checks, python-typecheck]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.18"
          enable-cache: auto
          cache-dependency-glob: uv.lock
          prune-cache: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build package artifacts
        run: uv build --sdist --wheel --python 3.14 --out-dir dist

      - name: Upload package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
